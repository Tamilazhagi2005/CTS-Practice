<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#events">Events</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="help.html" target="_blank">Help</a></li>
        </ul>
    </nav>

    <!-- Main -->
    <section id="home">

        <div id="welcomeBanner">
            Welcome to Community Portal
            <span style="color:red; font-weight:bold;">
                Special Offer!
            </span>
        </div>

        <h2 class="highlight">Upcoming Events</h2>

    </section>

    <!-- Event Gallery -->
    <section id="events">

        <table>
            <caption>Community Events Gallery</caption>

            <tr>
                <td>
                    <img src="images/event1.jpg" alt="Music Event" title="Music Event" class="gallery">
                </td>

                <td>
                    <img src="images/event2.jpg" alt="Dance Event" title="Dance Event" class="gallery">
                </td>

                <td>
                    <img src="images/event3.jpg" alt="Food Event" title="Food Event" class="gallery">
                </td>
            </tr>

            <tr>
                <td>Music Fest</td>
                <td>Dance Show</td>
                <td>Food Carnival</td>
            </tr>

        </table>

    </section>

    <!-- Registration Form -->
    <section>

        <form id="eventForm">

            <input type="text"
                placeholder="Enter Name"
                required
                autofocus>

            <input type="email"
                placeholder="Enter Email"
                required>

            <input type="date" required>

            <select id="eventType" onchange="showFee()">
                <option value="">Select Event</option>
                <option value="100">Music - ₹100</option>
                <option value="200">Dance - ₹200</option>
            </select>

            <p id="fee"></p>

            <textarea id="feedback"
                placeholder="Enter feedback"
                onkeyup="countChars()"></textarea>

            <p id="charCount">0 Characters</p>

            <input type="text"
                placeholder="Phone Number"
                onblur="validatePhone()"
                id="phone">

            <button type="button"
                onclick="submitForm()">
                Submit
            </button>

            <output id="outputMsg"></output>

        </form>

    </section>

    <!-- Video -->
    <section>

        <video width="400"
            controls
            oncanplay="videoReady()">

            <source src="sample.mp4" type="video/mp4">

        </video>

        <p id="videoMsg"></p>

    </section>

    <!-- Geolocation -->
    <section>

        <button onclick="findLocation()">
            Find Nearby Events
        </button>

        <p id="location"></p>

    </section>

    <!-- Footer -->
    <footer id="contact">
        <p>Contact Us</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
