Phone:
<input type="text" onblur="validatePhone()">

<br><br>

<select onchange="showFee(this.value)">
<option>Select</option>
<option value="100">Music</option>
<option value="200">Sports</option>
</select>

<p id="fee"></p>

<img src="img1.jpg"
width="100"
ondblclick="this.style.width='300px'">

<br><br>

<textarea
onkeyup="countChar(this)">
</textarea>

<p id="count">0</p>

<button onclick="alert('Submitted Successfully')">
Submit
</button>

<script>

function validatePhone()
{
alert("Phone validation executed");
}

function showFee(fee)
{
document.getElementById("fee").innerHTML =
"Fee = ₹"+fee;
}

function countChar(txt)
{
document.getElementById("count").innerHTML =
txt.value.length;
}

</script>
